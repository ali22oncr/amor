<!DOCTYPE html>
<!--
  pra você — um site simples, feito com HTML, CSS e JavaScript.
  quer personalizar? procura o bloco "PERSONALIZE AQUI" lá no <script>,
  perto do final do arquivo. é só trocar o que tá entre aspas " ".
-->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pra você meu amor 🤍</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --noite-1: #0d0b1e;
    --noite-2: #1c1640;
    --noite-3: #2f2456;
    --luz: #f0bf6c;
    --rosa: #e8a1a8;
    --papel: #f6f0e6;
    --texto-suave: #cdc6e8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Karla', sans-serif;
    background: linear-gradient(180deg, var(--noite-1) 0%, var(--noite-2) 55%, var(--noite-3) 100%);
    color: var(--papel);
    overflow-x: hidden;
  }

  h1, h2, .thesis, .signature {
    font-family: 'Fraunces', serif;
  }

  /* ---------- estrelinhas de fundo ---------- */
  .stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .star {
    position: absolute;
    background: var(--papel);
    border-radius: 50%;
    animation: piscar 4s ease-in-out infinite;
  }

  @keyframes piscar {
    0%, 100% { opacity: .15; }
    50% { opacity: .9; }
  }

  /* ---------- layout geral das seções ---------- */
  section {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 24px;
  }

  .eyebrow {
    font-size: .75rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--luz);
    margin-bottom: 28px;
  }

  /* ---------- foto + brilho + constelação ---------- */
  .photo-wrap {
    position: relative;
    width: min(300px, 78vw);
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .photo-wrap::before {
    content: '';
    position: absolute;
    inset: -30px;
    background: radial-gradient(circle, rgba(240,191,108,0.35) 0%, rgba(240,191,108,0) 70%);
    animation: respirar 5s ease-in-out infinite;
    z-index: 0;
  }

  @keyframes respirar {
    0%, 100% { transform: scale(1); opacity: .8; }
    50% { transform: scale(1.12); opacity: 1; }
  }

  .constellation {
    position: absolute;
    width: 150%;
    height: 150%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
    overflow: visible;
  }

  .constellation-line {
    fill: none;
    stroke: var(--luz);
    stroke-width: .6;
    opacity: .3;
  }

  .constellation-star {
    fill: var(--luz);
    animation: piscar 3s ease-in-out infinite;
    animation-delay: var(--d);
  }

  .polaroid {
    position: relative;
    z-index: 1;
    background: var(--papel);
    padding: 14px;
    border-radius: 4px;
    box-shadow: 0 25px 60px rgba(0,0,0,.55);
    transform: rotate(-2.5deg);
    width: 100%;
  }

  .polaroid img {
    width: 100%;
    display: block;
    border-radius: 2px;
    filter: brightness(1.12) contrast(1.04) saturate(1.05);
  }

  h1 {
    font-weight: 600;
    font-size: clamp(1.8rem, 6vw, 2.6rem);
    margin-bottom: 18px;
  }

  .thesis {
    max-width: 440px;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(1.05rem, 3vw, 1.25rem);
    line-height: 1.6;
    color: var(--texto-suave);
  }

  .scroll-cue {
    position: absolute;
    bottom: 36px;
    left: 50%;
    margin-left: -21px;
    background: none;
    border: 1px solid rgba(246,240,230,.3);
    color: var(--papel);
    width: 42px;
    height: 42px;
    border-radius: 50%;
    font-size: 1rem;
    cursor: pointer;
    animation: descer 2.2s ease-in-out infinite;
  }

  @keyframes descer {
    0%, 100% { transform: translateY(0); opacity: .7; }
    50% { transform: translateY(8px); opacity: 1; }
  }

  h2 {
    font-weight: 600;
    font-size: clamp(1.6rem, 5vw, 2.1rem);
    margin-bottom: 20px;
  }

  /* ---------- botões ---------- */
  .btn {
    font-family: 'Karla', sans-serif;
    font-weight: 700;
    border: none;
    background: linear-gradient(135deg, var(--luz), var(--rosa));
    color: #241a3d;
    padding: 15px 34px;
    border-radius: 999px;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 0 10px 26px rgba(240,191,108,.22);
    transition: transform .2s ease, box-shadow .2s ease;
  }

  .btn:hover { transform: translateY(-3px); box-shadow: 0 14px 30px rgba(240,191,108,.32); }

  /* ---------- cartinha ---------- */
  .letter-card {
    margin-top: 28px;
    max-width: 500px;
    text-align: left;
    background: rgba(246,240,230,.06);
    border: 1px solid rgba(246,240,230,.15);
    backdrop-filter: blur(12px);
    border-radius: 18px;
    padding: 30px;
    animation: surgir .7s ease forwards;
  }

  .letter-card.hidden { display: none; }

  @keyframes surgir {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .letter-card p {
    line-height: 1.85;
    margin-bottom: 16px;
  }
  .letter-card p:last-child { margin-bottom: 0; }

  /* ---------- pontos de luz ---------- */
  .section-sub {
    color: var(--texto-suave);
    margin-bottom: 34px;
    max-width: 380px;
  }

  .lights-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 22px;
    max-width: 380px;
    width: 100%;
  }

  .light-point {
    aspect-ratio: 1;
    perspective: 900px;
    cursor: pointer;
  }

  .light-point-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform .6s;
    transform-style: preserve-3d;
  }

  .light-point.flipped .light-point-inner {
    transform: rotateY(180deg);
  }

  .light-point-front, .light-point-back {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    padding: 10px;
    text-align: center;
  }

  .light-point-front {
    background: radial-gradient(circle at 35% 30%, rgba(240,191,108,.5), rgba(240,191,108,.08) 70%);
    border: 1px solid rgba(240,191,108,.4);
    box-shadow: 0 0 24px rgba(240,191,108,.25);
    font-size: 1.4rem;
    color: var(--luz);
  }

  .light-point-back {
    background: linear-gradient(135deg, var(--luz), var(--rosa));
    color: #241a3d;
    font-weight: 700;
    font-size: .85rem;
    transform: rotateY(180deg);
  }

  /* ---------- final ---------- */
  .final-thesis {
    max-width: 460px;
    font-size: clamp(1.2rem, 4vw, 1.6rem);
    margin-bottom: 36px;
  }

  .light-btn {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    border: none;
    background: radial-gradient(circle, var(--luz), var(--rosa));
    font-size: 1.8rem;
    cursor: pointer;
    box-shadow: 0 0 40px rgba(240,191,108,.4);
    transition: transform .2s ease;
  }

  .light-btn:hover { transform: scale(1.08); }

  .signature {
    margin-top: 26px;
    font-style: italic;
    font-size: 1.3rem;
    color: var(--luz);
  }

  .footer-note {
    margin-top: 50px;
    font-size: .8rem;
    color: rgba(246,240,230,.35);
  }

  /* ---------- explosão de luz ---------- */
  .burst-particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 20;
    animation: burst .9s ease-out forwards;
  }

  @keyframes burst {
    to { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
  }

  button:focus-visible {
    outline: 2px solid var(--luz);
    outline-offset: 3px;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: .01ms !important;
    }
  }

  @media (max-width: 420px) {
    section { padding: 50px 20px; }
    .lights-grid { gap: 16px; }
  }
</style>
</head>

  <h1>oi, <span id="nome-dela">meu amor</span> 🤍</h1>
  <p class="thesis" id="hero-thesis"></p>

  <button class="scroll-cue" id="scroll-btn" aria-label="continuar">↓</button>
</section>

<!-- ================= CARTINHA ================= -->
<section class="letter-section">
  <h2>posso te contar uma coisa?</h2>
  <button id="open-letter-btn" class="btn">abrir a cartinha 💌</button>
  <div id="letter-content" class="letter-card hidden"></div>
</section>

<!-- ================= PONTOS DE LUZ ================= -->
<section class="lights-section">
  <h2>pontos de luz</h2>
  <p class="section-sub">umas coisinhas que iluminam meus dias — clica pra ver</p>
  <div id="lights-grid" class="lights-grid"></div>
</section>

<!-- ================= FINAL ================= -->
<section class="closing-section">
  <p class="thesis final-thesis" id="closing-thesis"></p>
  <button id="heart-btn" class="light-btn" aria-label="mandar um pouco de luz">🤍</button>
  <p class="signature" id="signature"></p>
  <p class="footer-note" id="footer-note"></p>
</section>

<script>
  // ============================================
  // 🌟 PERSONALIZE AQUI ANTES DE MANDAR 🌟
  // troque só o que tá dentro das aspas " "
  // ============================================
  const conteudo = {
    nomeDela: "meu amor",        // ex: "Ana"
    nomeDele: "Alisson",         // seu nome ou apelido, ex: "João"

    tese: "tem dias que eu ando meio apagado e estranho. Mas em tudo que a gente vive, sempre tem uma luz. e ela é você.",

    cartinha: [
      "Eu sei que esses dias eu to estranho e diferente.",
      "mas isso não é sobre você, porque voce é o motivo da minha felicidade meu amor.",
      "Me desculpa por isso. você não fez nada errado, voce é perfeita.",
      "você é uma das partes mais importantes da minha vida e eu quero mesmo estar mais junto com vc, mais aberto, mais resiliente, te escuta do mais , e sendo melhor, do jeito que você merece.",
      "obrigado por ter paciência comigo enquanto eu aprendo a ser melhor, eu te amo muito . (e esse site, feito rapido, é só uma tentativa de mostrar isso, o quanto eu te amo.)"
    ],

    luzes: [
      "seu sorriso",
      "do jeito que você me escuta",
      "sua força, mesmo nos dias difíceis",
      "por ser exatamente você"
    ],

    teseFinal: "mesmo nos dias escuros, você é a luz que eu quero voltar.",

    rodape: ""
  };

  // -------- injeta os textos personalizados na página --------
  document.getElementById('nome-dela').textContent = conteudo.nomeDela;
  document.getElementById('hero-thesis').textContent = conteudo.tese;
  document.getElementById('closing-thesis').textContent = conteudo.teseFinal;
  document.getElementById('signature').textContent = `com carinho, ${conteudo.nomeDele}`;
  document.getElementById('footer-note').textContent = conteudo.rodape;

  // -------- monta os parágrafos da cartinha --------
  const letterCard = document.getElementById('letter-content');
  conteudo.cartinha.forEach(paragrafo => {
    const p = document.createElement('p');
    p.textContent = paragrafo;
    letterCard.appendChild(p);
  });

  // -------- monta os "pontos de luz" (cards que viram) --------
  const lightsGrid = document.getElementById('lights-grid');
  conteudo.luzes.forEach(texto => {
    const ponto = document.createElement('div');
    ponto.className = 'light-point';
    ponto.innerHTML = `
      <div class="light-point-inner">
        <div class="light-point-front">✦</div>
        <div class="light-point-back">${texto}</div>
      </div>`;
    ponto.addEventListener('click', () => ponto.classList.toggle('flipped'));
    lightsGrid.appendChild(ponto);
  });

  // -------- botão de abrir a cartinha --------
  document.getElementById('open-letter-btn').addEventListener('click', (e) => {
    letterCard.classList.remove('hidden');
    e.target.style.display = 'none';
  });

  // -------- rolagem suave a partir do botão inicial --------
  document.getElementById('scroll-btn').addEventListener('click', () => {
    document.querySelector('.letter-section').scrollIntoView({ behavior: 'smooth' });
  });

  // -------- gera as estrelinhas do fundo --------
  const starsContainer = document.getElementById('stars');
  const totalEstrelas = 70;
  for (let i = 0; i < totalEstrelas; i++) {
    const estrela = document.createElement('div');
    estrela.className = 'star';
    const tamanho = (Math.random() * 1.8 + 0.6).toFixed(1);
    estrela.style.width = `${tamanho}px`;
    estrela.style.height = `${tamanho}px`;
    estrela.style.left = `${Math.random() * 100}vw`;
    estrela.style.top = `${Math.random() * 100}vh`;
    estrela.style.animationDelay = `${Math.random() * 4}s`;
    starsContainer.appendChild(estrela);
  }

  // -------- explosão de luz quando clica no botão final --------
  document.getElementById('heart-btn').addEventListener('click', (e) => {
    const rect = e.target.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const cores = ['#f0bf6c', '#e8a1a8', '#f6f0e6'];

    for (let i = 0; i < 18; i++) {
      const particula = document.createElement('div');
      particula.className = 'burst-particle';
      const tam = Math.random() * 6 + 4;
      particula.style.width = `${tam}px`;
      particula.style.height = `${tam}px`;
      particula.style.left = `${cx}px`;
      particula.style.top = `${cy}px`;
      particula.style.background = cores[Math.floor(Math.random() * cores.length)];

      const angulo = Math.random() * Math.PI * 2;
      const distancia = Math.random() * 120 + 60;
      particula.style.setProperty('--dx', `${Math.cos(angulo) * distancia}px`);
      particula.style.setProperty('--dy', `${Math.sin(angulo) * distancia}px`);

      document.body.appendChild(particula);
      setTimeout(() => particula.remove(), 900);
    }
  });
</script>
</body>
</html>
